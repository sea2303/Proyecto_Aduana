services:
  auth-db:
    image: mysql:8.0
    container_name: auth-mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - auth_db_data:/var/lib/mysql
    networks:
      - aduana-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 5

  servidor-eureka:
    build: ./servidor-eureka
    container_name: servidor-eureka
    ports:
      - "8761:8761"
    networks:
      - aduana-network

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_HOST=servidor-eureka
    depends_on:
      servidor-eureka:
        condition: service_started
    networks:
      - aduana-network

  auth-service:
    build: ./servicio-autenticacion
    container_name: servicio-autenticacion
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=auth-db
      - DB_USER=root
      - DB_PASSWORD=password
      - EUREKA_HOST=servidor-eureka
    depends_on:
      auth-db:
        condition: service_healthy
      servidor-eureka:
        condition: service_started
    networks:
      - aduana-network

  pasajero-service:
