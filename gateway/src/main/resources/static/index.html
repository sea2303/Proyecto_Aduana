<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Control de Aduanas - Tomás</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">🇨🇱 Aduanas Chile - Control de Accesos</span>
        <span id="user-badge" class="badge bg-secondary">Sin iniciar sesión</span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-primary text-white">Iniciar Sesión</div>
                <div class="card-body">
                    <form id="login-form">
                        <div class="mb-3">
                            <label class="form-label">RUT</label>
                            <input type="text" id="login-rut" class="form-control" placeholder="12345678-9" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" id="login-password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Ingresar al Sistema</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                    <span>Vehículos en Aduana</span>
                    <button onclick="cargarVehiculos()" class="btn btn-sm btn-light">🔄 Actualizar</button>
                </div>
                <div class="card-body">
                    <table class="table table-striped table-hover">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Patente</th>
                            <th>Marca</th>
                            <th>Modelo</th>
                            <th>Estado</th>
                        </tr>
                        </thead>
                        <tbody id="tabla-vehiculos">
                        <tr>
                            <td colspan="5" class="text-center text-muted">Presiona actualizar para cargar datos...</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">Registrar Nuevo Vehículo</div>
                <div class="card-body">
                    <form id="vehiculo-form">
                        <div class="row">
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Patente</label>
                                <input type="text" id="vehiculo-patente" class="form-control" placeholder="AB-CD-12" required>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Marca</label>
                                <input type="text" id="vehiculo-marca" class="form-control" placeholder="Toyota" required>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Modelo</label>
                                <input type="text" id="vehiculo-modelo" class="form-control" placeholder="Yaris" required>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Estado</label>
                                <select id="vehiculo-estado" class="form-control">
                                    <option value="En Aduana">En Aduana</option>
                                    <option value="Liberado">Liberado</option>
                                    <option value="Retenido">Retenido</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Guardar Vehículo</button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const GATEWAY_URL = 'http://localhost:8080';

    async function cargarVehiculos() {
        const tbody = document.getElementById('tabla-vehiculos');
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">

        try {
            const response = await fetch(`${GATEWAY_URL}/vehiculo-service/api/vehiculos/`);
            if (!response.ok) throw new Error(`Error en el servidor (Código: ${response.status})`);

            const vehiculos = await response.json();
            tbody.innerHTML = '';

            if (vehiculos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-warning">⚠ Conectado con éxito, pero no hay vehículos en la BD.</td></tr>';
                return;
            }

            vehiculos.forEach(v => {
                tbody.innerHTML += `
                        <tr>
                            <td>${v.id}</td>
                            <td><strong>${v.patente}</strong></td>
                            <td>${v.marca}</td>
                            <td>${v.modelo}</td>
                            <td><span class="badge bg-success">${v.estado || 'En Aduana'}</span></td>
                        </tr>
                    `;
            });
        } catch (error) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">
        }
    }

    document.getElementById('vehiculo-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const patenteInput = document.getElementById('vehiculo-patente').value;
        const marcaInput = document.getElementById('vehiculo-marca').value;
        const modeloInput = document.getElementById('vehiculo-modelo').value;
        const estadoInput = document.getElementById('vehiculo-estado').value;

        try {
            const response = await fetch(`${GATEWAY_URL}/vehiculo-service/api/vehiculos/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    patente: patenteInput,
                    marca: marcaInput,
                    modelo: modeloInput,
                    estado: estadoInput
                })
            });

            if (response.ok) {
                alert('¡Vehículo registrado exitosamente a través del Gateway!');
                document.getElementById('vehiculo-form').reset();
                cargarVehiculos();
            } else {
                alert('Error al guardar el vehículo en el servidor.');
            }
        } catch (error) {
            alert('Error de conexión con el Gateway.');
        }
    });

    document.getElementById('login-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const rutInput = document.getElementById('login-rut').value;
        const passwordInput = document.getElementById('login-password').value;
        const badge = document.getElementById('user-badge');

        try {
            const response = await fetch(`${GATEWAY_URL}/servicio-autenticacion/api/autenticacion/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    rut: rutInput,
                    contrasena: passwordInput
                })
            });

            const data = await response.json();

            if (response.ok) {
                alert("¡" + data.mensaje + "!");
                badge.innerText = `👤 RUT: ${rutInput}`;
                badge.className = "badge bg-success";
                cargarVehiculos();
            } else {
                alert("Error: " + (data.error || "No se pudo iniciar sesión"));
            }

        } catch (error) {
            alert("No hubo respuesta del servicio de autenticación.");
        }
    });
</script>
</body>
</html>
