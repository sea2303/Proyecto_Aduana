services:
  auth-db:
    image: mysql:8.0
    container_name: auth-mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root_secure_pass
      MYSQL_DATABASE: aduana_db
    ports:
      - "3308:3306"
    volumes:
      - auth_db_data:/var/lib/mysql
    networks:
      - aduana-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secure_pass"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: .
    container_name: servicio-autenticacion
    ports:
      - "8091:8090"
    environment:
      - PORT=8090
      - DB_HOST=auth-db
      - DB_PORT=3306
      - DB_NAME=aduana_db
      - DB_USER=root
      - DB_PASSWORD=root_secure_pass
      - JPA_DDL_AUTO=update
      - EUREKA_URL=http://docker.internal
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - aduana-network

volumes:
  auth_db_data:

networks:
  aduana-network:
    driver: bridge
